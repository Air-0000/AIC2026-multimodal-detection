# AIC 2026 — M2I2HA Baseline 训练配置
# 基于官方 m2i2ha.yaml，适配 AIC 2026 竞赛

algorithm:
  # 基础
  name: "m2i2ha"
  task: "detect"
  imgsz: 640

  # 训练
  use_dfl: True
  reg_max: 16
  topk: 10
  alpha: 0.5
  beta: 6.0
  close_mosaic_epoch: 0.9
  max_det: 100             # 比赛上限 100 个框

  # 验证
  plot: True

  # Loss 权重
  box: 7.5
  cls: 0.5
  dfl: 1.5

  # 检测阈值
  iou_thres: 0.7
  conf_thres_val: 0.001
  conf_thres_det: 0.25

optimizer:
  opt_type: "SGD"
  lr: 0.01
  final_factor: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  grad_clip: 10.0
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1

scheduler:
  sch_type: CustomLRDecay

net:
  initialize_weights: True
  net_scale: "s"            # nano | small — 先用 s，MPS 可用 n
  channels: 3

data:
  augment: True
  fraction: 1.0
  pin_memory: True
  single_cls: False
  rect: False
  stride: 32
  bgr: 0.0
  nbs: 64
  batch_size: 16            # 根据 GPU 显存调整
  mosaic: 1.0
  mixup: 0.0
  cutmix: 0.0
  erasing: 0.4
  copy_paste: 0.0
  copy_paste_mode: "flip"
  auto_augment: randaugment
  flipud: 0.0
  fliplr: 0.5
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  perspective: 0.0
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
