# AIC 2026 数据集配置 — Track 1: M2I2HA RGB+IR 双模态 Baseline
#
# 数据目录结构预期:
#   {path}/
#     images/train/       ← RGB 图像 (PNG/JPG)
#     images/val/         ← RGB 验证集
#     ir/train/           ← 红外图像
#     ir/val/
#     labels/train/       ← YOLO 格式标签 (.txt)
#     labels/val/
#
# 标签格式 (YOLO):
#   class_id x_center y_center width height
#   坐标归一化到 [0, 1]
#
# 部署前将 {path} 改为服务器上的实际路径

name: aic2026
path: /path/to/aic2026/data            # ← TODO: 部署时修改
dataset_type: MultiModalYoloDataset
modalities:
  - img
  - ir

# 图像目录（相对于 path）
train_imgs_dir: images/train
train_irs_dir: ir/train
val_imgs_dir: images/val
val_irs_dir: ir/val
test_imgs_dir: images/test
test_irs_dir: ir/test

# 标签目录（相对于 path）
train_labels_dir: labels/train
val_labels_dir: labels/val
test_labels_dir: labels/test

# 类别
nc: 12
class_names:
  - person
  - car
  - bicycle
  - motorcycle
  - bus
  - truck
  - animal
  - stroller
  - cart
  - umbrella
  - ball
  - uav
