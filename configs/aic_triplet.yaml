# AIC 2026 数据集配置 — Track 2: RGB+Depth+IR 三模态
#
# 数据目录结构预期:
#   {path}/
#     visible/{train,val,test}/    ← RGB 图像 (PNG/JPG)
#     infrared/{train,val,test}/   ← 红外图像 (PNG)
#     depth/{train,val,test}/      ← Depth 图像 (16bit PNG, 单通道)
#     labels/{train,val,test}/     ← YOLO 格式标签 (.txt)
#
# 注意: M2I2HA 原生 MultiModalYoloDataset 只支持 [img, ir] 两个 modality
# 这个 config 用于 Track 2 的自定义数据集加载器，需要扩展
# MultiModalYoloDataset 以支持第三模态
#
# 12 类别（竞赛官方定义）:
#   0: person       1: boat         2: animal       3: seat
#   4: sign         5: bicycle      6: car          7: ball
#   8: light        9: garbage_can  10: uav         11: tricycle

name: aic2026_triplet
path: /path/to/aic2026/data            # ← TODO: 部署时修改
dataset_type: AICTripletDataset        # ← 自定义数据集类（见 src/aic2026/data/）
modalities:
  - img
  - depth
  - ir

# 图像目录（相对于 path）
train_imgs_dir: visible/train
train_depth_dir: depth/train
train_irs_dir: infrared/train
val_imgs_dir: visible/val
val_depth_dir: depth/val
val_irs_dir: infrared/val
test_imgs_dir: visible/test
test_depth_dir: depth/test
test_irs_dir: infrared/test

# 标签目录（相对于 path）
train_labels_dir: labels/train
val_labels_dir: labels/val
test_labels_dir: labels/test

# Depth 预处理参数
depth_normalization: log              # log | linear
depth_max_mm: 19999

# 类别（竞赛官方 12 类）
nc: 12
class_names:
  - person       # 0
  - boat         # 1
  - animal       # 2
  - seat         # 3
  - sign         # 4
  - bicycle      # 5
  - car          # 6
  - ball         # 7
  - light        # 8
  - garbage_can  # 9
  - uav          # 10
  - tricycle     # 11
