# AIC 2026 数据集配置 — Track 2: RGB+Depth+IR 三模态
#
# 数据目录结构预期:
#   {path}/
#     images/train/       ← RGB 图像 (PNG/JPG)
#     images/val/
#     depth/train/        ← Depth 图像 (16bit PNG, 单通道)
#     depth/val/
#     ir/train/           ← 红外图像 (3-channel 8bit PNG)
#     ir/val/
#     labels/train/       ← YOLO 格式标签 (.txt)
#     labels/val/
#
# 注意: M2I2HA 原生 MultiModalYoloDataset 只支持 [img, ir] 两个 modality
# 这个 config 用于 Track 2 的自定义数据集加载器，需要扩展
# MultiModalYoloDataset 以支持第三模态

name: aic2026_triplet
path: /path/to/aic2026/data            # ← TODO: 部署时修改
dataset_type: AICTripletDataset        # ← 自定义数据集类（见 src/aic2026/data/）
modalities:
  - img
  - depth
  - ir

# 图像目录（相对于 path）
train_imgs_dir: images/train
train_depth_dir: depth/train
train_irs_dir: ir/train
val_imgs_dir: images/val
val_depth_dir: depth/val
val_irs_dir: ir/val
test_imgs_dir: images/test
test_depth_dir: depth/test
test_irs_dir: ir/test

# 标签目录（相对于 path）
train_labels_dir: labels/train
val_labels_dir: labels/val
test_labels_dir: labels/test

# Depth 预处理参数
depth_normalization: log              # log | linear
depth_max_mm: 19999

# 类别
nc: 12
class_names:
  - person
  - car
  - bicycle
  - motorcycle
  - bus
  - truck
  - animal
  - stroller
  - cart
  - umbrella
  - ball
  - uav
